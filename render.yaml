services:
  - type: web_service
    name: criollos-auth
    env: docker
    region: oregon
    root: Auth
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SERVER_PORT
        value: "8080"
    plan: starter

  - type: web_service
    name: criollos-producto
    env: docker
    region: oregon
    root: Producto
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SERVER_PORT
        value: "8080"
      - key: NOTIFICATION_SERVICE_URL
        value: https://noti-b116.onrender.com
    plan: starter

  - type: web_service
    name: criollos-pedidos
    env: docker
    region: oregon
    root: Pedidos
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SERVER_PORT
        value: "8080"
      - key: CRIOLLOS_AUTH_URL
        value: https://auth-j0i2.onrender.com
      - key: CRIOLLOS_PRODUCTO_URL
        value: https://producto-2fxd.onrender.com
      - key: CRIOLLOS_NOTI_URL
        value: https://noti-b116.onrender.com
    plan: starter

  - type: web_service
    name: criollos-noti
    env: docker
    region: oregon
    root: noti
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SERVER_PORT
        value: "8080"
      - key: BREVO_API_KEY
        value: AGREGAR_EN_DASHBOARD
    plan: starter
