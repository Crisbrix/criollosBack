spring.application.name=noti
server.port=${PORT:8083}

spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${BREVO_SMTP_KEY}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=15000
spring.mail.properties.mail.smtp.timeout=15000
spring.mail.properties.mail.smtp.writetimeout=15000

notifications.orders.recipient-email=cmateoramirez@ucundinamarca.edu.co
notifications.orders.from-email=cmateoramirez@ucundinamarca.edu.co
